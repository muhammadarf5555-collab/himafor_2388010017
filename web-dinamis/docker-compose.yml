# Layanan database
services:
  db-webdinamis:
    image: mariadb:lts
    environment:
      MYSQL_ROOT_PASSWORD: password!123
      MYSQL_DATABASE: dbcompro_2388010017
      MYSQL_USER: userwebdinamis_2388010017
      MYSQL_PASSWORD: Arifrizky12345678
    volumes:
      - db_data:/var/lib/mysql
      - ./db_data/dbcompro_2388010017.sql:/docker-entrypoint-initdb.d/dbcompro_2388010017.sql:ro
    restart: always

  container-statis:
    image: muharifrizky0225pohv/himafor_2388010017:latest
    ports:
      - "80:80"
    restart: always

  container-dinamis:
    image: muharifrizky0225pohv/web-dinamis_2388010017:latest
    ports:
      - "3000:3000"
    restart: always
    environment:
      - DB_HOST=db-webdinamis
      - DB_USER=userwebdinamis_2388010017
      - DB_PASSWORD=Arifrizky12345678
      - DB_NAME=dbcompro_2388010017
      - NEXTAUTH_SECRET=ini-adalah-kata-random
      - NEXTAUTH_URL=http://54.254.89.240:3000
    depends_on:
      - db-webdinamis

volumes:
  db_data: {}
