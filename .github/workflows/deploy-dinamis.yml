name: Deploy Web Dinamis to AWS EC2
on:
  push:
    branches: [ main ]
    path:
      - 'web-dinamis/**'
      - '.github/workflows/deploy-dinamis.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./web-dinamis
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/web-dinamis_2388010017:latest

  deploy-to-ec2:
    needs: build-and-deploy-web-dinamis
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: deploy to EC2 via SSH and run docker compose
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AWS_HOST }}
        username: ${{ secrets.AWS_USERNAME }}
        key: ${{ secrets.AWS_PRIVATE_KEY }}
        port: 22
        script:  |
          # Hapus container lama jika ada
          docker rm -f /home/ubuntu/container-dinamis/database
          docker rm -f /home/ubuntu/container-dinamis/web-dinamis
    - name: copy compose file EC2 via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.AWS_HOST }}
        username: ${{ secrets.AWS_USERNAME }}
        key: ${{ secrets.AWS_PRIVATE_KEY }}
        port: 22
        source: "./web-dinamis/docker-compose.yml,web-dinamis/db_data/dbcompro_2388010017.sql"
        target: "/home/ubuntu/container-dinamis"

    - name: Deploy web dinamis via SSH and run docker compose
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.AWS_HOST }}
        username: ${{ secrets.AWS_USERNAME }}
        key: ${{ secrets.AWS_PRIVATE_KEY }}
        port: 22
        script: |
          cd /home/ubuntu/container-dinamis
          docker compose pull
          # run docker compose
          docker compose up -d
        